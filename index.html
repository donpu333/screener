<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoScreener Pro · WebSocket + Оптимизация</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
      <link rel="icon" type="image/svg+xml" href="./favicon.svg">
</head>
<body>
<!-- ===== HEADER ===== -->
<div class="header">
  <button class="collapse-toggle-btn" id="collapseToggleBtn" title="Свернуть/Развернуть фильтры">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</button>

<!-- 🔥 ОБЁРТКА ДЛЯ СВОРАЧИВАНИЯ -->
<div class="header-collapsible" id="headerCollapsible">
    
   <!-- ===== СТРОКА 1: ФИЛЬТРЫ + АЛЕРТ ===== -->
   <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; width: 100%;">
     <div class="filters" id="filters" style="display: flex; gap: 6px;">
       <button class="filter-btn" data-filter="all">Все <span class="count" id="count-all">0</span></button>
      <!-- Лидеры роста -->
<button class="filter-btn active" data-filter="gainers" title="Лидеры роста">
    <svg width="24" height="24" viewBox="0 -0.5 25 25" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display: inline-block; vertical-align: middle;">

    </svg>
    <span class="count" id="count-gainers">0</span>
</button>
       <!-- Лидеры падения -->
<button class="filter-btn" data-filter="losers" title="Лидеры падения">
    <svg width="24" height="24" viewBox="0 -0.5 25 25" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display: inline-block; vertical-align: middle;">
        <path d="M10 16.75C10.4142 16.75 10.75 16.4142 10.75 16C10.75 15.5858 10.4142 15.25 10 15.25V16.75ZM6 15.25C5.58579 15.25 5.25 15.5858 5.25 16C5.25 16.4142 5.58579 16.75 6 16.75V15.25ZM5.25 16C5.25 16.4142 5.58579 16.75 6 16.75C6.41421 16.75 6.75 16.4142 6.75 16H5.25ZM6.75 12C6.75 11.5858 6.41421 11.25 6 11.25C5.58579 11.25 5.25 11.5858 5.25 12H6.75ZM5.46967 15.4697C5.17678 15.7626 5.17678 16.2374 5.46967 16.5303C5.76256 16.8232 6.23744 16.8232 6.53033 16.5303L5.46967 15.4697ZM13 9L13.5303 8.46967C13.2374 8.17678 12.7626 8.17678 12.4697 8.46967L13 9ZM16 12L15.4697 12.5303C15.7626 12.8232 16.2374 12.8232 16.5303 12.5303L16 12ZM20.5303 8.53033C20.8232 8.23744 20.8232 7.76256 20.5303 7.46967C20.2374 7.17678 19.7626 7.17678 19.4697 7.46967L20.5303 8.53033ZM10 15.25H6V16.75H10V15.25ZM6.75 16V12H5.25V16H6.75ZM6.53033 16.5303L13.5303 9.53033L12.4697 8.46967L5.46967 15.4697L6.53033 16.5303ZM12.4697 9.53033L15.4697 12.5303L16.5303 11.4697L13.5303 8.46967L12.4697 9.53033ZM16.5303 12.5303L20.5303 8.53033L19.4697 7.46967L15.4697 11.4697L16.5303 12.5303Z" fill="currentColor"/>
    </svg>
    <span class="count" id="count-losers">0</span>
</button>
       <!-- Высокий объём -->
<button class="filter-btn" data-filter="volume" title="Высокий объём">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display: inline-block; vertical-align: middle;">
        <path d="M1,14.535l1-1v10.465H1V14.535Zm3.972-3.972l.028,13.438,1-.002-.03-14.434-.998,.998Zm4.528-4.527l-.53,.53,.03,17.435,1-.002-.03-17.493-.47-.47ZM22.5,0h-5.5V1h5.293l-6.793,6.793L9.5,1.793,.057,11.236l.707,.707L9.5,3.207l6,6L23,1.707V7h1V1.5c0-.827-.673-1.5-1.5-1.5Zm1.5,18c0,3.309-2.691,6-6,6s-6-2.691-6-6,2.691-6,6-6,6,2.691,6,6Zm-1,0c0-2.757-2.243-5-5-5s-5,2.243-5,5,2.243,5,5,5,5-2.243,5-5Zm-5.878-2h1.77c.102,0,.608,.024,.608,.5h1c0-.869-.677-1.5-1.608-1.5h-.392v-1h-1v1h-.378c-.895,0-1.622,.728-1.622,1.622,0,.729,.491,1.372,1.22,1.57l2.286,.499c.291,.077,.494,.342,.494,.643,0,.367-.299,.666-.666,.666h-1.668c-.156,0-.666-.036-.666-.5h-1c0,.883,.686,1.5,1.666,1.5h.334v1h1v-1h.334c.919,0,1.666-.747,1.666-1.666,0-.752-.508-1.414-1.258-1.614l-2.284-.498c-.27-.074-.458-.32-.458-.6,0-.343,.279-.622,.622-.622Z"/>
    </svg>
    <span class="count" id="count-volume">0</span>
</button>


     </div>
     
     <button class="alert-btn" id="alertPanelBtn">
       <svg width="24" height="24" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
           <path fill="currentColor" d="M 126.5 0 L 134.5 1 L 144 6 L 150 17.5 L 150 39.5 L 151.5 41 L 158.5 43 Q 169.8 49.2 178 58.5 Q 187.1 67.9 192 81.5 L 195 93.5 L 195 145.5 Q 197.5 147 196 152.5 L 202 166.5 L 207.5 172 L 219 177 L 225 188.5 L 225 198.5 L 219 210 L 209.5 215 L 204.5 216 L 175 216 L 168 234.5 L 159.5 244 L 147.5 252 L 138.5 255 L 125.5 256 Q 123.7 253.3 117.5 255 L 108.5 252 L 93 240.5 Q 83.7 230.9 81 216 L 51.5 216 L 46.5 215 L 36 208.5 Q 30.1 202.4 31 189.5 Q 32.7 181.7 37.5 177 L 48.5 172 L 54 166.5 L 58 158.5 L 61 145.5 L 61 93.5 L 64 81.5 Q 70.9 63.4 84.5 52 L 97.5 43 L 106 39.5 L 106 17.5 L 112 6 L 121.5 1 L 126.5 0 Z M 126 15 L 124 16 L 120 20 L 121 21 L 120 22 L 120 37 L 125 36 Q 131 34 133 37 L 136 37 L 136 22 L 136 20 Q 134 14 126 15 Z M 120 51 Q 107 53 99 59 L 84 74 L 77 89 L 75 100 L 75 152 L 69 170 L 69 171 L 188 171 L 184 163 L 181 152 L 181 100 Q 178 98 180 92 L 172 74 L 158 59 L 153 56 L 138 51 L 120 51 Z M 51 186 L 49 187 L 45 193 L 47 199 L 51 201 L 206 201 L 208 200 L 211 197 L 210 196 L 211 193 L 211 191 L 206 186 L 51 186 Z M 97 216 L 100 227 Q 107 237 122 241 L 135 241 L 147 236 Q 157 230 160 217 L 97 216 Z" />
           <path fill="currentColor" d="M 51.5 4 L 57 7.5 L 58 13.5 Q 42.5 27.5 31 45.5 Q 20.6 61.6 17 84.5 L 13.5 89 L 8.5 90 L 3 85.5 L 3 78.5 L 6 66.5 Q 10.3 50.8 18 38.5 Q 28 22.5 41.5 10 L 47.5 5 L 51.5 4 Z" />
           <path fill="currentColor" d="M 204.5 4 L 208.5 5 L 223 18.5 Q 237.3 33.7 246 54.5 L 253 78.5 L 253 85.5 Q 250.9 89.9 244.5 90 L 240 86.5 L 233 61.5 L 225 45.5 Q 214.3 28.2 199 15.5 L 198 9.5 L 201.5 5 L 204.5 4 Z" />
           <path fill="currentColor" d="M 66.5 28 Q 75.3 26.3 77 31.5 L 77 37.5 Q 63.1 49.1 54 65.5 L 51 74.5 L 49 76.5 L 47 88.5 L 43.5 94 L 37.5 95 L 33 91.5 L 32 85.5 Q 38.9 54.9 57.5 36 L 66.5 28 Z" />
           <path fill="currentColor" d="M 182.5 28 L 189.5 28 L 201 38.5 Q 210.6 49.4 217 63.5 L 221 73.5 L 224 89.5 L 220.5 94 L 214.5 95 L 211 92.5 L 209 88.5 L 207 76.5 L 205 74.5 L 202 65.5 Q 192.9 49.1 179 37.5 L 179 31.5 L 182.5 28 Z" />
       </svg>
       <span id="alertCount" class="alert-badge" style="display:none;">0</span>
     </button>

<!-- ===== STATUS BAR ===== -->
<div class="status-bar">
    <div style="display: flex; align-items: center; gap: 16px;">
        <span id="marketStatus">⚡ Загрузка рынка...</span>
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить данные</button>
    </div>
    
        <span id="wsStatus">🔌 WebSocket: отключён</span>
    </div>
</div>




   <!-- ===== СТРОКА 2: НАСТРОЙКИ ===== -->
   <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
     <div class="volume-slider">
       <span style="color:#aaa; font-size:12px;">Мин.объём:</span>
       <select id="minVolumeSelect" style="width:100px;">
           <option value="10000000" selected>$10M</option>
           <option value="20000000">$20M</option>
           <option value="30000000">$30M</option>
           <option value="50000000">$50M</option>
           <option value="70000000">$70M</option>
           <option value="100000000">$100M</option>
       </select>
     </div>

     <span style="color:#aaa; font-size:12px;">Изм. цены:</span>
     <select id="minPriceChangeSelect" style="width:90px;">
         <option value="0" selected>Любое</option>
         <option value="1">&gt; |1%|</option>
         <option value="2">&gt; |2%|</option>
         <option value="5">&gt; |5%|</option>
         <option value="10">&gt; |10%|</option>
         <option value="20">&gt; |20%|</option>
     </select>

     <span style="color:#aaa; font-size:12px;">Рост объёма:</span>
     <select id="minVolChangeSelect" style="width:90px;">
         <option value="0" selected>Любое</option>
         <option value="5">&gt; 5%</option>
         <option value="10">&gt; 10%</option>
         <option value="20">&gt; 20%</option>
         <option value="30">&gt; 30%</option>
         <option value="50">&gt; 50%</option>
     </select>

     <span style="color:#aaa; font-size:12px;">Рост сделок:</span>
     <select id="minTradesChangeSelect" style="width:90px;">
         <option value="0" selected>Любое</option>
         <option value="5">&gt; 5%</option>
         <option value="10">&gt; 10%</option>
         <option value="20">&gt; 20%</option>
         <option value="30">&gt; 30%</option>
         <option value="50">&gt; 50%</option>
     </select>

     <span style="color:#aaa; font-size:12px;">NATR:</span>
     <select id="minNatrSelect" style="width:90px;">
         <option value="0" selected>Любое</option>
         <option value="1">&gt; 1%</option>
         <option value="2">&gt; 2%</option>
         <option value="3">&gt; 3%</option>
         <option value="5">&gt; 5%</option>
         <option value="7">&gt; 7%</option>
         <option value="10">&gt; 10%</option>
     </select>

     <select id="sortDirSelect">
         <option value="desc">▼ Убыв.</option>
         <option value="asc">▲ Возр.</option>
     </select>
     
     <span style="color:#aaa; font-size:12px;">Таймфрейм:</span>
     <select id="intervalSelect">
         <option value="1m">1м</option>
         <option value="5m">5м</option>
         <option value="15m" selected>15м</option>
         <option value="1h">1ч</option>
         <option value="4h">4ч</option>
         <option value="1d">1D</option>
     </select>
     
     <span style="color:#aaa; font-size:12px;">Биржи:</span>
     <select id="exchangeSelect">
         <option value="all">Все биржи</option>
         <option value="Binance" selected>Binance</option> 
         <option value="Bybit">Bybit</option>
     </select>
     
     <span style="color:#aaa; font-size:12px;">Кол.график:</span>
     <select id="limitSelect">
         <option value="50">50</option>
         <option value="100">100</option>
         <option value="200">200</option>
         <option value="300">300</option>
         <option value="500">500</option>
         <option value="1000">1000</option>
         <option value="all" selected>Все</option>
     </select>
     
     <span style="color:#aaa; font-size:12px;">Расположение:</span>
     <select id="gridColsSelect" style="width:100px;">
         <option value="1">1 колонка</option>
         <option value="2" selected>2 колонки</option>
         <option value="3">3 колонки</option>
         <option value="4">4 колонки</option>
         <option value="6">6 колонок</option>
     </select>

     <button class="flag-filter-button" id="flagFilterButton">
       <span class="flag-dots">
           <span class="flag-dot red"></span>
           <span class="flag-dot blue"></span>
           <span class="flag-dot green"></span>
           <span class="flag-dot yellow"></span>
       </span>
       <span class="flag-arrow-down">▼</span>
     </button>
   </div>

<!-- 🔥 ЗАКРЫТЬ ОБЁРТКУ -->
</div>
</div>


<!-- ===== GRID CONTAINER ===== -->
<div class="grid-container" id="gridContainer">
    <div class="loading">
        <div class="spinner"></div>
        Загрузка...
    </div>
</div>

<!-- ===== ALERT MODAL ===== -->
<div id="alertModal" class="modal-overlay" style="display:none;">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">🔔 Управление оповещениями</div>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div id="alertListContainer" style="max-height:300px; overflow-y:auto; margin-bottom:16px;"></div>
        <button class="btn-secondary" id="showCreateAlertForm" style="margin-bottom:12px;">➕ Создать новый алерт</button>
        <div id="createAlertForm" style="display:none;">
            <div class="form-group">
                <label>Пара (Symbol)</label>
                <select id="alertSymbolSelect">
                    <option value="__ALL__">🌐 Все пары</option>
                </select>
            </div>
            <div class="form-group">
                <label>Тип условия</label>
                <select id="alertTypeSelect">
                    <option value="price">Цена (текущая)</option>
                    <option value="change_1m">Изменение цены 1м (%)</option>
                    <option value="change_5m">Изменение цены 5м (%)</option>
                    <option value="change_15m">Изменение цены 15м (%)</option>
                    <option value="change_1h">Изменение цены 1ч (%)</option>
                    <option value="change_24h">Изменение цены 24ч (%)</option>
                    <option value="volume_24h">Объём 24ч (USDT)</option>
                    <option value="vol_change_1m">Рост объёма 1м (%)</option>
                    <option value="vol_change_5m">Рост объёма 5м (%)</option>
                    <option value="vol_change_15m">Рост объёма 15м (%)</option>
                    <option value="vol_change_1h">Рост объёма 1ч (%)</option>
                    <option value="natr">NATR (14) %</option>
                    <option value="trades_count">Кол-во сделок (24ч)</option>
                    <option value="trades_change_1m">Рост сделок 1м (%)</option>
                    <option value="trades_change_5m">Рост сделок 5м (%)</option>
                    <option value="trades_change_15m">Рост сделок 15м (%)</option>
                    <option value="trades_change_1h">Рост сделок 1ч (%)</option>
                    <option value="level">Графический уровень (цена)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Условие</label>
                <select id="alertOperatorSelect">
                    <option value="above">Выше &gt;</option>
                    <option value="below">Ниже &lt;</option>
                </select>
            </div>
            <div class="form-group">
                <label>Порог</label>
                <input type="number" id="alertThresholdInput" step="any" placeholder="Например, 50000">
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="alertSoundCheck" checked> 🔊 Звуковое оповещение</label>
            </div>
            <button class="btn-primary" id="saveAlertBtn">Сохранить алерт</button>
            <button class="btn-secondary" id="cancelCreateBtn" style="margin-top:8px;">Отмена</button>
        </div>
    </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/metrics.js"></script>
<script src="js/adapters.js"></script>
<script src="js/card-chart.js"></script>
<script src="js/chart-pool.js"></script>
<script src="js/websocket.js"></script>
<script src="js/alert-manager.js"></script>
<script src="js/screener.js"></script>
<script src="js/app.js"></script>
<!-- Кнопка "Наверх" -->
<button id="scrollToTopBtn" class="scroll-top-btn" style="display: none;">
    ↑
</button>
</body>
</html>
