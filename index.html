<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoScreener Pro · WebSocket + Оптимизация</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="logo">📊 Crypto<span>Screener Pro</span> <span style="font-size:12px;color:#ffb300;">+WebSocket</span></div>
    
    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Все <span class="count" id="count-all">0</span></button>
        <button class="filter-btn" data-filter="market">📈 Рынок <span class="count" id="count-market">0</span></button>
        <button class="filter-btn" data-filter="signals">🎯 Сигналы <span class="count" id="count-signals">0</span></button>
        <button class="filter-btn" data-filter="gainers">📈 Лидеры роста <span class="count" id="count-gainers">0</span></button>
        <button class="filter-btn" data-filter="losers">📉 Лидеры падения <span class="count" id="count-losers">0</span></button>
        <button class="filter-btn" data-filter="volume">🔥 Высокий объём <span class="count" id="count-volume">0</span></button>
    </div>
    
    <div class="settings">
        <button class="alert-btn" id="alertPanelBtn">🔔 Оповещения <span id="alertCount" class="alert-badge" style="display:none;">0</span></button>
        
        <div class="volume-slider">
            <span style="color:#aaa; font-size:12px;">Мин.объём:</span>
            <select id="minVolumeSelect" style="width:100px;">
                <option value="0">Любой</option>
                <option value="100000">$100k</option>
                <option value="500000">$500k</option>
                <option value="1000000" selected>$1M</option>
                <option value="5000000">$5M</option>
                <option value="10000000">$10M</option>
            </select>
        </div>
        <!-- В раздел .settings добавить -->
<select id="marketTypeSelect">
    <option value="futures" selected>Фьючерсы</option>
    <option value="spot">Спот</option>
</select>
        <div class="sort-row">
            <span style="color:#aaa; font-size:13px;">Сорт:</span>
            <select id="sortSelect" style="min-width:200px;">
                <option value="default">🔹 По умолчанию</option>
                <optgroup label="── Изменение цены ──">
                    <option value="change1m">📈 % цены 1м</option>
                    <option value="change5m">📈 % цены 5м</option>
                    <option value="change15m">📈 % цены 15м</option>
                    <option value="change1h">📈 % цены 1ч</option>
                    <option value="change24h">📈 % цены 24ч</option>
                </optgroup>
                <optgroup label="── Рост объёма ──">
                    <option value="volChange1m">📊 Рост объема 1м</option>
                    <option value="volChange5m">📊 Рост объема 5м</option>
                    <option value="volChange15m">📊 Рост объема 15м</option>
                    <option value="volChange1h">📊 Рост объема 1ч</option>
                    <option value="volume">📊 Объём 24ч</option>
                </optgroup>
                <optgroup label="── Рост сделок ──">
                    <option value="tradesChange1m">🔄 Рост сделок 1м</option>
                    <option value="tradesChange5m">🔄 Рост сделок 5м</option>
                    <option value="tradesChange15m">🔄 Рост сделок 15м</option>
                    <option value="tradesChange1h">🔄 Рост сделок 1ч</option>
                    <option value="trades">🔄 Кол-во сделок (24ч)</option>
                </optgroup>
                <optgroup label="── Волатильность ──">
                    <option value="natr">📉 NATR (14)</option>
                </optgroup>
            </select>
            <select id="sortDirSelect">
                <option value="desc">▼ Убыв.</option>
                <option value="asc">▲ Возр.</option>
            </select>
        </div>
        
        <select id="intervalSelect">
            <option value="1m">1м</option>
            <option value="5m">5м</option>
            <option value="15m" selected>15м</option>
            <option value="1h">1ч</option>
            <option value="4h">4ч</option>
            <option value="1d">1D</option>
        </select>
        
        <select id="exchangeSelect">
            <option value="all">Все биржи</option>
            <option value="Binance">Binance</option>
            <option value="Bybit">Bybit</option>
        </select>
        
        <select id="limitSelect">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="300">300</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
            <option value="all">Все</option>
        </select>
        
        <select id="gridColsSelect" style="width:100px;">
            <option value="auto">Авто</option>
            <option value="1">1 колонка</option>
            <option value="2">2 колонки</option>
            <option value="3">3 колонки</option>
            <option value="4">4 колонки</option>
            <option value="6">6 колонок</option>
        </select>
    </div>
</div>

<!-- ===== STATUS BAR ===== -->
<div class="status-bar">
    <div style="display: flex; align-items: center; gap: 16px;">
        <span id="marketStatus">⚡ Загрузка рынка...</span>
        <button class="refresh-btn" id="refreshBtn">🔄 Обновить данные</button>
    </div>
    
        <span id="wsStatus">🔌 WebSocket: отключён</span>
    </div>
</div>

<!-- ===== GRID CONTAINER ===== -->
<div class="grid-container" id="gridContainer">
    <div class="loading">
        <div class="spinner"></div>
        Загрузка...
    </div>
</div>

<!-- ===== ALERT MODAL ===== -->
<div id="alertModal" class="modal-overlay" style="display:none;">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">🔔 Управление оповещениями</div>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div id="alertListContainer" style="max-height:300px; overflow-y:auto; margin-bottom:16px;"></div>
        <button class="btn-secondary" id="showCreateAlertForm" style="margin-bottom:12px;">➕ Создать новый алерт</button>
        <div id="createAlertForm" style="display:none;">
            <div class="form-group">
                <label>Пара (Symbol)</label>
                <select id="alertSymbolSelect">
                    <option value="__ALL__">🌐 Все пары</option>
                </select>
            </div>
            <div class="form-group">
                <label>Тип условия</label>
                <select id="alertTypeSelect">
                    <option value="price">Цена (текущая)</option>
                    <option value="change_1m">Изменение цены 1м (%)</option>
                    <option value="change_5m">Изменение цены 5м (%)</option>
                    <option value="change_15m">Изменение цены 15м (%)</option>
                    <option value="change_1h">Изменение цены 1ч (%)</option>
                    <option value="change_24h">Изменение цены 24ч (%)</option>
                    <option value="volume_24h">Объём 24ч (USDT)</option>
                    <option value="vol_change_1m">Рост объёма 1м (%)</option>
                    <option value="vol_change_5m">Рост объёма 5м (%)</option>
                    <option value="vol_change_15m">Рост объёма 15м (%)</option>
                    <option value="vol_change_1h">Рост объёма 1ч (%)</option>
                    <option value="natr">NATR (14) %</option>
                    <option value="trades_count">Кол-во сделок (24ч)</option>
                    <option value="trades_change_1m">Рост сделок 1м (%)</option>
                    <option value="trades_change_5m">Рост сделок 5м (%)</option>
                    <option value="trades_change_15m">Рост сделок 15м (%)</option>
                    <option value="trades_change_1h">Рост сделок 1ч (%)</option>
                    <option value="level">Графический уровень (цена)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Условие</label>
                <select id="alertOperatorSelect">
                    <option value="above">Выше &gt;</option>
                    <option value="below">Ниже &lt;</option>
                </select>
            </div>
            <div class="form-group">
                <label>Порог</label>
                <input type="number" id="alertThresholdInput" step="any" placeholder="Например, 50000">
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="alertSoundCheck" checked> 🔊 Звуковое оповещение</label>
            </div>
            <button class="btn-primary" id="saveAlertBtn">Сохранить алерт</button>
            <button class="btn-secondary" id="cancelCreateBtn" style="margin-top:8px;">Отмена</button>
        </div>
    </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/metrics.js"></script>
<script src="js/adapters.js"></script>
<script src="js/card-chart.js"></script>
<script src="js/chart-pool.js"></script>
<script src="js/websocket.js"></script>
<script src="js/alert-manager.js"></script>
<script src="js/screener.js"></script>
<script src="js/app.js"></script>

</body>
</html>
